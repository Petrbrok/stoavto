x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://xn--24-6kci2dcrid.xn--p1ai}

    env_file:
      - .env

    container_name: stoavto-site
    restart: unless-stopped
    init: true
    logging: *default-logging

    ports:
      - "127.0.0.1:3000:3000"

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    volumes:
      - ./data:/app/data

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  vpn:
    image: qmcgaw/gluetun:v3
    container_name: stoavto-vpn
    restart: unless-stopped
    logging: *default-logging

    cap_add:
      - NET_ADMIN

    devices:
      - /dev/net/tun:/dev/net/tun

    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ${PROTON_OPENVPN_USERNAME:?PROTON_OPENVPN_USERNAME is required}
      OPENVPN_PASSWORD: ${PROTON_OPENVPN_PASSWORD:?PROTON_OPENVPN_PASSWORD is required}
      OPENVPN_PROTOCOL: tcp
      OPENVPN_ENDPOINT_PORT: "443"
      FREE_ONLY: "on"
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
      HEALTH_RESTART_VPN: "on"
      TZ: Europe/Moscow

    expose:
      - "8888"

    volumes:
      - ./vpn-state:/gluetun

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: stoavto-tunnel
    restart: unless-stopped
    logging: *default-logging

    environment:
      HTTP_PROXY: http://vpn:8888
      HTTPS_PROXY: http://vpn:8888
      NO_PROXY: site,localhost,127.0.0.1

    command:
      - tunnel
      - --no-autoupdate
      - --protocol
      - http2
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}

    depends_on:
      site:
        condition: service_healthy
      vpn:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL
